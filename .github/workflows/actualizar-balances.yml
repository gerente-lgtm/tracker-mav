name: Actualizar balances desde Notion

# Lee la base de Notion "Tracker MAV — Balances" y guarda balances.json en el
# repo. El tracker (index.html) lee ese archivo. Usa el permiso por defecto del
# workflow para commitear (sin tokens extra).
#
# Juan publica un balance después de cada partido. Para capturarlo pronto sin
# gastar corridas de madrugada, corre cada 30 min SOLO en la franja de partidos.
# Franja activa: 18:00 a 06:00 UTC = 1:00 PM a 1:00 AM hora Colombia (UTC-5).
# También se puede disparar a mano desde la pestaña Actions.
on:
  schedule:
    - cron: "0,30 18-23 * * *"
    - cron: "0,30 0-6 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Las acciones checkout@v4 / setup-python@v5 corren en Node 20 (deprecado).
# Esto las fuerza a Node 24 desde ya y silencia el aviso de deprecación.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Leer Notion y generar balances.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/actualizar_balances.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "Agente MAV"
          git config user.email "actions@github.com"
          git add balances.json
          if git diff --staged --quiet; then
            echo "Sin cambios en balances.json"
          else
            git commit -m "Actualiza balances desde Notion"
            git push
          fi
