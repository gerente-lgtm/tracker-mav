name: Actualizar balances desde Notion

# Lee la base de Notion "Tracker MAV — Balances" y guarda balances.json en el
# repo. El tracker (index.html) lee ese archivo. Usa el permiso por defecto del
# workflow para commitear (sin tokens extra).
#
# Se dispara por EVENTO: cuando el repo "buzón" termina de escribir un balance
# en Notion, llama a la API de GitHub (repository_dispatch, tipo
# "balance-actualizado") y este workflow corre al instante. Así el tracker se
# actualiza apenas se sube el balance, sin polling.
#
# El cron queda solo como RESPALDO (2 latidos al día), por si el disparo falla
# o si alguna vez se edita Notion a mano: 23:00 UTC = 6 PM y 05:00 UTC = 12 AM
# hora Colombia (UTC-5). También se puede disparar a mano desde la pestaña Actions.
on:
  repository_dispatch:
    types: [balance-actualizado]
  schedule:
    - cron: "0 23 * * *"
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Las acciones checkout@v4 / setup-python@v5 corren en Node 20 (deprecado).
# Esto las fuerza a Node 24 desde ya y silencia el aviso de deprecación.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Leer Notion y generar balances.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/actualizar_balances.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "Agente MAV"
          git config user.email "actions@github.com"
          git add balances.json
          if git diff --staged --quiet; then
            echo "Sin cambios en balances.json"
          else
            git commit -m "Actualiza balances desde Notion"
            git push
          fi
